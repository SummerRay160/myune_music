name: Windows Installer Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-installer:
    if: github.repository != 'xiaobaimc/myune_music'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show tool versions
        shell: pwsh
        run: |
          flutter --version
          rustc --version
          cargo --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Install Inno Setup Chinese language pack
        shell: pwsh
        run: |
          $langDir = "${env:ProgramFiles(x86)}\Inno Setup 6\Languages"
          if (-not (Test-Path "$langDir\ChineseSimplified.isl")) {
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/master/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$langDir\ChineseSimplified.isl"
            Write-Output "Downloaded ChineseSimplified.isl"
          } else {
            Write-Output "ChineseSimplified.isl already exists"
          }

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" build_setup.iss

      - name: Upload portable Windows build
        uses: actions/upload-artifact@v4
        with:
          name: myune-music-windows-portable
          path: build/windows/x64/runner/Release

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: myune-music-windows-installer
          path: output_setup/*.exe
